name: Rollback to Previous Version

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - Test
          - Dev
      solution_name:
        description: 'Solution name to rollback'
        required: true
        default: 'PharmaTrack360_Core'
      backup_artifact:
        description: 'Backup artifact name (from a previous deployment run)'
        required: true
      backup_run_id:
        description: 'GitHub Actions Run ID that created the backup artifact (find in the Actions URL)'
        required: false

jobs:
  rollback:
    runs-on: windows-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.0.0

    - name: Setup Power Platform CLI
      uses: microsoft/powerplatform-actions/actions-install@v1.0.0

    # --- Option A: download by run_id (preferred — unambiguous) ---
    - name: Download backup artifact by run ID
      if: ${{ github.event.inputs.backup_run_id != '' }}
      uses: dawidd6/action-download-artifact@v6
      with:
        github_token: ${{ secrets.PAT_TOKEN }}
        run_id: ${{ github.event.inputs.backup_run_id }}
        name: ${{ github.event.inputs.backup_artifact }}
        path: rollback-artifact

    # --- Option B: search by name across all runs (fallback) ---
    - name: Download backup artifact by name search
      if: ${{ github.event.inputs.backup_run_id == '' }}
      uses: dawidd6/action-download-artifact@v6
      with:
        github_token: ${{ secrets.PAT_TOKEN }}
        name: ${{ github.event.inputs.backup_artifact }}
        path: rollback-artifact
        search_artifacts: true
        # Searches most recent matching artifact across all workflows

    - name: List downloaded artifact contents
      shell: pwsh
      run: |
        Write-Host "Contents of rollback-artifact:"
        Get-ChildItem -Recurse rollback-artifact | Select-Object FullName

    - name: Locate solution zip
      id: find_zip
      shell: pwsh
      run: |
        $zip = Get-ChildItem -Path "rollback-artifact" -Filter "*.zip" -Recurse | Select-Object -First 1
        if (-not $zip) {
          Write-Error "No .zip file found in the downloaded artifact."
          exit 1
        }

        $normalizedPath = $zip.FullName -replace '\\', '/'
        Write-Host "Normalized path: $normalizedPath"
        echo "zip_path=$normalizedPath" >> $env:GITHUB_OUTPUT

        # Resolve solution name from zip, fall back to input
        $solutionName = "${{ github.event.inputs.solution_name }}"
        try {
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($zip.FullName)
          $entry = $archive.Entries | Where-Object { $_.Name -eq "solution.xml" }
          if ($entry) {
            $reader = New-Object System.IO.StreamReader($entry.Open())
            $content = $reader.ReadToEnd()
            $reader.Close()
            if ($content -match '<UniqueName>(.+?)</UniqueName>') {
              $solutionName = $matches[1]
              Write-Host "Resolved solution name from zip: $solutionName"
            }
          }
          $archive.Dispose()
        } catch {
          Write-Warning "Could not read solution.xml from zip, using input name: $solutionName"
        }
        echo "solution_name=$solutionName" >> $env:GITHUB_OUTPUT

    - name: Verify solution name inside zip matches input
      shell: pwsh
      run: |
        $zipPath = "${{ steps.find_zip.outputs.zip_path }}"
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
        $solutionEntry = $zip.Entries | Where-Object { $_.Name -eq "solution.xml" }
        if ($solutionEntry) {
          $stream = $solutionEntry.Open()
          $reader = New-Object System.IO.StreamReader($stream)
          $content = $reader.ReadToEnd()
          $reader.Close(); $zip.Dispose()
          if ($content -match '<UniqueName>(.+?)</UniqueName>') {
            $innerName = $matches[1]
            Write-Host "Solution unique name inside zip: $innerName"
            if ($innerName -ne "${{ github.event.inputs.solution_name }}") {
              Write-Warning "⚠️ Zip solution name '$innerName' differs from input '${{ github.event.inputs.solution_name }}'. Using name from zip."
              echo "resolved_solution_name=$innerName" >> $env:GITHUB_OUTPUT
            } else {
              echo "resolved_solution_name=${{ github.event.inputs.solution_name }}" >> $env:GITHUB_OUTPUT
            }
          }
        } else {
          $zip.Dispose()
          Write-Warning "Could not find solution.xml in zip — proceeding with input name."
          echo "resolved_solution_name=${{ github.event.inputs.solution_name }}" >> $env:GITHUB_OUTPUT
        }
    - name: Bump version in rollback zip
      id: bump_version
      shell: pwsh
      run: |
        $zipPath = "${{ steps.find_zip.outputs.zip_path }}"
        Add-Type -AssemblyName System.IO.Compression.FileSystem

        # Extract zip to a temp folder
        $tempDir = "rollback-unpacked"
        if (Test-Path $tempDir) { Remove-Item $tempDir -Recurse -Force }
        [System.IO.Compression.ZipFile]::ExtractToDirectory($zipPath, $tempDir)

        # Find solution.xml
        $solutionXml = Get-ChildItem -Path $tempDir -Filter "solution.xml" -Recurse | Select-Object -First 1
        if (-not $solutionXml) {
          Write-Error "solution.xml not found in zip."
          exit 1
        }

        # Use run_number for build segment to guarantee version always exceeds
        # whatever version is currently in TEST (same strategy as deploy-to-test)
        [xml]$xml = Get-Content $solutionXml.FullName -Encoding UTF8
        $current = $xml.ImportExportXml.SolutionManifest.Version
        $parts = $current -split '\.'
        $parts[2] = "${{ github.run_number }}"
        $parts[3] = "0"
        $newVersion = $parts -join '.'
        $xml.ImportExportXml.SolutionManifest.Version = $newVersion
        $xml.Save($solutionXml.FullName)
        Write-Host "Version bumped: $current → $newVersion"
        echo "new_version=$newVersion" >> $env:GITHUB_OUTPUT

        # Repack zip in-place
        Remove-Item $zipPath -Force
        [System.IO.Compression.ZipFile]::CreateFromDirectory($tempDir, $zipPath)
        Remove-Item $tempDir -Recurse -Force
        Write-Host "Repacked zip: $zipPath"

    - name: Delete stale holding solution (if exists)
      continue-on-error: true
      uses: microsoft/powerplatform-actions/delete-solution@v1.0.0
      with:
        environment-url: ${{ github.event.inputs.environment == 'Test' && secrets.TEST_ENVIRONMENT_URL || secrets.DEV_ENVIRONMENT_URL }}
        app-id: ${{ github.event.inputs.environment == 'Test' && secrets.TEST_CLIENT_ID || secrets.DEV_CLIENT_ID }}
        client-secret: ${{ github.event.inputs.environment == 'Test' && secrets.TEST_CLIENT_SECRET || secrets.DEV_CLIENT_SECRET }}
        tenant-id: ${{ secrets.TENANT_ID }}
        solution-name: ${{ github.event.inputs.solution_name }}_Upgrade

    - name: Import backup solution as holding to ${{ github.event.inputs.environment }}
      uses: microsoft/powerplatform-actions/import-solution@v1.0.0
      with:
        environment-url: ${{ github.event.inputs.environment == 'Test' && secrets.TEST_ENVIRONMENT_URL || secrets.DEV_ENVIRONMENT_URL }}
        app-id: ${{ github.event.inputs.environment == 'Test' && secrets.TEST_CLIENT_ID || secrets.DEV_CLIENT_ID }}
        client-secret: ${{ github.event.inputs.environment == 'Test' && secrets.TEST_CLIENT_SECRET || secrets.DEV_CLIENT_SECRET }}
        tenant-id: ${{ secrets.TENANT_ID }}
        solution-file: ${{ steps.find_zip.outputs.zip_path }}
        force-overwrite: true
        publish-changes: false       # Don't publish mid-import; publish after upgrade instead
        skip-dependency-check: false
        run-asynchronously: true
        max-async-wait-time: 60
        import-as-holding: true

    - name: Upgrade solution in ${{ github.event.inputs.environment }}
      uses: microsoft/powerplatform-actions/upgrade-solution@v1.0.0
      with:
        environment-url: ${{ github.event.inputs.environment == 'Test' && secrets.TEST_ENVIRONMENT_URL || secrets.DEV_ENVIRONMENT_URL }}
        app-id: ${{ github.event.inputs.environment == 'Test' && secrets.TEST_CLIENT_ID || secrets.DEV_CLIENT_ID }}
        client-secret: ${{ github.event.inputs.environment == 'Test' && secrets.TEST_CLIENT_SECRET || secrets.DEV_CLIENT_SECRET }}
        tenant-id: ${{ secrets.TENANT_ID }}
        solution-name: ${{ steps.find_zip.outputs.solution_name }}
        async: true
        max-async-wait-time: 60

    - name: Notify on success
      if: success()
      run: |
        echo "✅ Rollback of ${{ github.event.inputs.solution_name }} v${{ steps.bump_version.outputs.new_version }} (from artifact '${{ github.event.inputs.backup_artifact }}') succeeded in ${{ github.event.inputs.environment }}"

    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Rollback failed for ${{ github.event.inputs.solution_name }} in ${{ github.event.inputs.environment }} — check the logs above"